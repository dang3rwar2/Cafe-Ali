<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>منوی کافه</title>

<style>
body{
font-family:tahoma;
background:#f8f4ef;
margin:0;
padding:20px;
color:#333;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#5d4037;
}

h2{
border-bottom:2px solid #ddd;
padding-bottom:5px;
margin-top:30px;
}

.item{
display:flex;
justify-content:space-between;
padding:8px 0;
}

.footer{
text-align:center;
margin-top:30px;
color:#666;
}
</style>
</head>

<body>

<div class="container">

<h1>☕ کافه دوست من</h1>

<h2>نوشیدنی‌های گرم</h2>

<div class="item">
<span>اسپرسو</span>
<span>3 ₼</span>
</div>

<div class="item">
<span>کاپوچینو</span>
<span>5 ₼</span>
</div>

<div class="item">
<span>لاته</span>
<span>6 ₼</span>
</div>

<h2>نوشیدنی‌های سرد</h2>

<div class="item">
<span>آیس لاته</span>
<span>6.5 ₼</span>
</div>

<div class="item">
<span>موهیتو</span>
<span>5 ₼</span>
</div>

<h2>دسر</h2>

<div class="item">
<span>چیزکیک</span>
<span>6 ₼</span>
</div>

<div class="item">
<span>براونی</span>
<span>5 ₼</span>
</div>

<div class="footer">
❤️ خوش آمدید
</div>

</div>

</body>
</html>
